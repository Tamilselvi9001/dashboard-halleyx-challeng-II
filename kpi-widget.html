<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KPI - Widget Configuration</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f8fa;color:#000;}
    .page{display:flex;height:100vh;overflow:hidden;}
    .config-panel{width:400px;min-width:400px;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;overflow:hidden;}
    .cp-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #e0e0e0;}
    .cp-header-title{font-size:15px;font-weight:700;color:#000;}
    .cp-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;font-size:20px;color:#555;border-radius:5px;line-height:1;}
    .cp-close:hover{background:#f0f0f0;}
    .cp-body{flex:1;overflow-y:auto;padding:20px;}
    .cp-footer{padding:14px 20px;border-top:1px solid #e0e0e0;display:flex;justify-content:flex-end;gap:10px;}
    .float-field{position:relative;margin-bottom:14px;}
    .float-input,.float-select{width:100%;padding:18px 14px 8px;border:1px solid #ccc;border-radius:8px;font-size:14px;color:#000;font-family:inherit;background:#fff;outline:none;transition:border-color 0.2s;appearance:none;}
    .float-textarea{width:100%;padding:22px 14px 8px;border:1px solid #ccc;border-radius:8px;font-size:14px;color:#000;font-family:inherit;background:#fff;outline:none;transition:border-color 0.2s;resize:vertical;min-height:90px;}
    .float-input:focus,.float-select:focus,.float-textarea:focus{border-color:#3dab7e;}
    .float-input.err,.float-select.err{border-color:#e53e3e;}
    .float-input[readonly]{background:#f5f5f5;color:#777;cursor:not-allowed;}
    .float-label{position:absolute;left:14px;top:14px;font-size:14px;color:#aaa;pointer-events:none;transition:all 0.15s;}
    .float-label.active{top:6px;font-size:11px;color:#3dab7e;}
    .float-input.err~.float-label,.float-select.err~.float-label{color:#e53e3e;}
    .float-label .req{color:#e53e3e;}
    .err-msg{font-size:11px;color:#e53e3e;margin-top:4px;display:none;}
    .err-msg.show{display:block;}
    .sel-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;}
    .spin-wrap{position:relative;}
    .spin-arrows{position:absolute;right:10px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:2px;}
    .spin-btn{border:none;background:none;cursor:pointer;color:#aaa;padding:0;line-height:1;font-size:10px;}
    .spin-btn:hover{color:#3dab7e;}
    .section-title{font-size:14px;font-weight:700;color:#000;margin:18px 0 12px;}
    .btn-cancel{padding:9px 22px;background:#fff;border:1.5px solid #ccc;border-radius:7px;font-size:13.5px;font-weight:500;color:#000;cursor:pointer;font-family:inherit;}
    .btn-cancel:hover{border-color:#999;}
    .btn-add{padding:9px 26px;background:#3dab7e;border:none;border-radius:7px;font-size:13.5px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;}
    .btn-add:hover{background:#2e8f67;}
    .preview-area{flex:1;background:#f7f8fa;overflow-y:auto;padding:24px;}
    .preview-section-label{font-size:14px;font-weight:700;color:#000;margin-bottom:4px;}
    .preview-sub{font-size:12px;color:#aaa;margin-bottom:24px;}
    /* KPI card */
    .kpi-card{background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;padding:20px 24px;min-width:220px;max-width:280px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
    .kpi-card-title{font-size:13px;color:#888;font-weight:500;margin-bottom:12px;}
    .kpi-card-value{font-size:30px;font-weight:700;color:#000;line-height:1.2;}
    /* empty state */
    .preview-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;border:2px dashed #ddd;border-radius:10px;color:#bbb;font-size:13px;gap:8px;}
    .toast{position:fixed;top:20px;right:24px;background:#3dab7e;color:#fff;display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:8px;font-size:13.5px;font-weight:500;z-index:9999;box-shadow:0 4px 14px rgba(0,0,0,0.15);opacity:0;pointer-events:none;transition:opacity 0.3s;max-width:380px;}
    .toast.show{opacity:1;pointer-events:auto;}
    .toast-icon{width:22px;height:22px;background:rgba(255,255,255,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .toast-x{cursor:pointer;margin-left:6px;font-size:17px;opacity:0.8;line-height:1;}
    .toast-x:hover{opacity:1;}
  </style>
</head>
<body>
<div class="toast" id="toast">
  <div class="toast-icon"><svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <span id="toastMsg"></span>
  <span class="toast-x" onclick="hideToast()">×</span>
</div>

<div class="page">
  <!-- CONFIG PANEL -->
  <div class="config-panel">
    <div class="cp-header">
      <span class="cp-header-title">Widget configuration</span>
      <button class="cp-close" onclick="goBack()">×</button>
    </div>
    <div class="cp-body">
      <!-- Widget title -->
      <div class="float-field">
        <input class="float-input" id="f-title" type="text" value="Untitled" oninput="syncLabel(this);livePreview()"/>
        <label class="float-label active">Widget title <span class="req">*</span></label>
        <span class="err-msg" id="e-title">Please fill the field</span>
      </div>
      <!-- Widget type -->
      <div class="float-field">
        <input class="float-input" id="f-type" type="text" value="KPI" readonly/>
        <label class="float-label active">Widget type <span class="req">*</span></label>
      </div>
      <!-- Description -->
      <div class="float-field">
        <textarea class="float-textarea" id="f-desc" oninput="syncLabelById('f-desc','l-desc')"></textarea>
        <label class="float-label" id="l-desc">Description</label>
      </div>
      <!-- Widget size default 2x2 -->
      <div class="section-title">Widget size</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="float-field spin-wrap">
          <input class="float-input" id="f-width" type="number" value="2" min="1" oninput="syncLabel(this)"/>
          <label class="float-label active">Width (Columns) <span class="req">*</span></label>
          <div class="spin-arrows"><button class="spin-btn" onclick="spin('f-width',1)">▲</button><button class="spin-btn" onclick="spin('f-width',-1)">▼</button></div>
        </div>
        <div class="float-field spin-wrap">
          <input class="float-input" id="f-height" type="number" value="2" min="1" oninput="syncLabel(this)"/>
          <label class="float-label active">Height (Rows) <span class="req">*</span></label>
          <div class="spin-arrows"><button class="spin-btn" onclick="spin('f-height',1)">▲</button><button class="spin-btn" onclick="spin('f-height',-1)">▼</button></div>
        </div>
      </div>
      <!-- Data setting -->
      <div class="section-title">Data setting</div>
      <!-- Select metric -->
      <div class="float-field" style="position:relative;">
        <select class="float-select" id="f-metric" onchange="syncLabel(this);livePreview()">
          <option value=""></option>
          <option value="Customer ID">Customer ID</option>
          <option value="Customer name">Customer name</option>
          <option value="Email id">Email id</option>
          <option value="Address">Address</option>
          <option value="Order date">Order date</option>
          <option value="Product">Product</option>
          <option value="Created by">Created by</option>
          <option value="Status">Status</option>
          <option value="Total amount">Total amount</option>
          <option value="Unit price">Unit price</option>
          <option value="Quantity">Quantity</option>
        </select>
        <label class="float-label">Select metric <span class="req">*</span></label>
        <svg class="sel-arrow" width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" stroke="#aaa" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="err-msg" id="e-metric">Please fill the field</span>
      </div>
      <!-- Aggregation -->
      <div class="float-field" style="position:relative;">
        <select class="float-select" id="f-agg" onchange="syncLabel(this);livePreview()">
          <option value=""></option>
          <option value="Sum">Sum</option>
          <option value="Average">Average</option>
          <option value="Count">Count</option>
        </select>
        <label class="float-label">Aggregation <span class="req">*</span></label>
        <svg class="sel-arrow" width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" stroke="#aaa" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="err-msg" id="e-agg">Please fill the field</span>
      </div>
      <!-- Data format -->
      <div class="float-field" style="position:relative;">
        <select class="float-select" id="f-format" onchange="syncLabel(this);livePreview()">
          <option value="Number">Number</option>
          <option value="Currency">Currency</option>
        </select>
        <label class="float-label active">Data format <span class="req">*</span></label>
        <svg class="sel-arrow" width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" stroke="#aaa" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <!-- Decimal Precision max 5 -->
      <div class="float-field spin-wrap">
        <input class="float-input" id="f-precision" type="number" value="0" min="0" max="5" oninput="clampPrecision();livePreview()"/>
        <label class="float-label active">Decimal Precision <span class="req">*</span></label>
        <div class="spin-arrows"><button class="spin-btn" onclick="spinPrecision(1)">▲</button><button class="spin-btn" onclick="spinPrecision(-1)">▼</button></div>
      </div>
      <div style="font-size:11px;color:#aaa;margin-top:-10px;margin-bottom:14px;">Default: 0 — Max allowed: 5</div>
    </div>
    <div class="cp-footer">
      <button class="btn-cancel" onclick="goBack()">Cancel</button>
      <button class="btn-add" id="addBtn" onclick="saveWidget()">Add</button>
    </div>
  </div>

  <!-- PREVIEW AREA -->
  <div class="preview-area">
    <div class="preview-section-label">KPI Component preview</div>
    <div class="preview-sub">Fill in the configuration to see the live preview</div>

    <!-- Preview card — only shows when metric + agg selected -->
    <div id="previewEmpty" class="preview-empty">
      <svg width="32" height="32" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="4" stroke="#ccc" stroke-width="1.5"/><path d="M8 12h8M12 8v8" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/></svg>
      Select metric and aggregation to see preview
    </div>

    <div id="previewCard" class="kpi-card" style="display:none;">
      <div class="kpi-card-title" id="previewTitle">Untitled</div>
      <div class="kpi-card-value" id="previewValue">0</div>
    </div>
  </div>
</div>

<script>
  var activeWidgetId = null;
  var orders = [];

  var metricFieldMap = {
    'Customer ID':'customerId','Customer name':'firstName','Email id':'email',
    'Address':'street','Order date':'createdAt','Product':'product',
    'Created by':'createdBy','Status':'status','Total amount':'totalAmount',
    'Unit price':'unitPrice','Quantity':'quantity'
  };

  function calculateValue(metric, agg) {
    if (!metric || !agg || orders.length === 0) return 0;
    var field = metricFieldMap[metric];
    if (!field) return 0;
    var values = orders.map(function(o){
      var val = o[field];
      var num = parseFloat(String(val).replace(/[^0-9.]/g,''));
      return isNaN(num) ? val : num;
    });
    if (agg === 'Count') return values.filter(function(v){ return v !== undefined && v !== ''; }).length;
    var nums = values.filter(function(v){ return typeof v === 'number' && !isNaN(v); });
    if (nums.length === 0) return values.filter(function(v){ return v !== undefined && v !== ''; }).length;
    if (agg === 'Sum') return nums.reduce(function(a,v){ return a+v; },0);
    if (agg === 'Average') return nums.reduce(function(a,v){ return a+v; },0)/nums.length;
    return 0;
  }

  function formatValue(val, format, precision) {
    var num = parseFloat(val)||0;
    if (format === 'Currency') return '$ '+num.toFixed(precision);
    return (num%1===0 && precision===0) ? String(Math.round(num)) : num.toFixed(precision);
  }

  function livePreview() {
    var title     = document.getElementById('f-title').value.trim() || 'Untitled';
    var metric    = document.getElementById('f-metric').value;
    var agg       = document.getElementById('f-agg').value;
    var format    = document.getElementById('f-format').value;
    var precision = parseInt(document.getElementById('f-precision').value)||0;

    /* Only show preview card when both metric AND aggregation are selected */
    if (metric && agg) {
      document.getElementById('previewEmpty').style.display = 'none';
      document.getElementById('previewCard').style.display  = 'block';
      document.getElementById('previewTitle').textContent = title;
      var rawVal = calculateValue(metric, agg);
      document.getElementById('previewValue').textContent = formatValue(rawVal, format, precision);
    } else {
      document.getElementById('previewEmpty').style.display = 'flex';
      document.getElementById('previewCard').style.display  = 'none';
    }
  }

  window.addEventListener('load', function() {
    try { orders = JSON.parse(localStorage.getItem('orders')||'[]'); } catch(e){ orders=[]; }
    activeWidgetId = localStorage.getItem('activeWidgetId');
    var raw = localStorage.getItem('activeWidgetData');
    if (raw) {
      try {
        var w = JSON.parse(raw);
        if (w.configured) {
          setValue('f-title',     w.title     || 'Untitled');
          setValue('f-desc',      w.desc      || '');
          setValue('f-width',     w.width     || 2);
          setValue('f-height',    w.height    || 2);
          setValue('f-metric',    w.metric    || '');
          setValue('f-agg',       w.agg       || '');
          setValue('f-format',    w.format    || 'Number');
          setValue('f-precision', w.precision !== undefined ? w.precision : 0);
          document.getElementById('addBtn').textContent = 'Save';
        }
      } catch(e){}
    }
    livePreview();
  });

  function setValue(id, val) {
    var el = document.getElementById(id);
    if (!el) return;
    el.value = val;
    syncLabel(el);
  }
  function syncLabel(el) {
    var lbl = el.parentElement.querySelector('.float-label');
    if (lbl) lbl.classList.toggle('active', String(el.value).trim()!=='');
  }
  function syncLabelById(inputId, labelId) {
    var el=document.getElementById(inputId), lbl=document.getElementById(labelId);
    if(lbl) lbl.classList.toggle('active', el && el.value.trim()!=='');
  }
  function spin(id,delta){
    var el=document.getElementById(id);
    el.value=Math.max(1,(parseInt(el.value)||1)+delta);
  }
  function clampPrecision(){
    var el=document.getElementById('f-precision');
    var val=parseInt(el.value);
    if(isNaN(val)||val<0) el.value=0;
    if(val>5) el.value=5;
  }
  function spinPrecision(delta){
    var el=document.getElementById('f-precision');
    el.value=Math.min(5,Math.max(0,(parseInt(el.value)||0)+delta));
    livePreview();
  }

  function saveWidget() {
    var valid=true;
    ['title','metric','agg'].forEach(function(f){
      var el=document.getElementById('f-'+f), em=document.getElementById('e-'+f);
      if(!el||!el.value.trim()){ if(el) el.classList.add('err'); if(em) em.classList.add('show'); valid=false; }
      else { if(el) el.classList.remove('err'); if(em) em.classList.remove('show'); }
    });
    if(!valid) return;

    var precision=Math.min(5,Math.max(0,parseInt(document.getElementById('f-precision').value)||0));
    var metric=document.getElementById('f-metric').value;
    var agg=document.getElementById('f-agg').value;
    var format=document.getElementById('f-format').value;
    var rawVal=calculateValue(metric,agg);
    var displayVal=formatValue(rawVal,format,precision);

    var config={
      type:'KPI Value', wtype:'kpi',
      title:document.getElementById('f-title').value.trim(),
      desc:document.getElementById('f-desc').value,
      width:parseInt(document.getElementById('f-width').value)||2,
      height:parseInt(document.getElementById('f-height').value)||2,
      metric:metric, agg:agg, format:format, precision:precision,
      value:displayVal, configured:true
    };
    localStorage.setItem('widgetConfigReturn', JSON.stringify({ widgetId:activeWidgetId, config:config }));
    showToast('All set! Your new widget have been added successfully!');
    setTimeout(goBack,1500);
  }

  function goBack(){ window.location.href='configure.html'; }
  var toastTimer=null;
  function showToast(msg){
    document.getElementById('toastMsg').textContent=msg;
    document.getElementById('toast').classList.add('show');
    if(toastTimer) clearTimeout(toastTimer);
    toastTimer=setTimeout(hideToast,3500);
  }
  function hideToast(){ document.getElementById('toast').classList.remove('show'); }
</script>
</body>
</html>
